###############################################################################
#  ZOMBIE SURVIVOR 3D — Plugin Listesi
#  Her satır bir plugin DOSYA ADIDIR (yol değil).
#  PluginLoader, adı js/plugins/ altında bularak yükler.
#
#  # ile başlayan satırlar yorumdur.
#  # satırbaşındaki # ile devre dışı bırakabilirsiniz.
###############################################################################


# =============================================================================
# 1) CORE — Sistem / Altyapı (yüksek öncelik, bağımlılık yok)
# =============================================================================
system_mod_loader         # Plugin modül yükleyici
system_map_intro          # Map intro animasyon sistemi
system_game_optimizer     # Performans / optimizasyon ayarları
system_reload             # Yeniden yükleme / restart yönetimi
system_touch_buttons      # Mobil dokunmatik buton sistemi
system_wave_manager       # Dalga yöneticisi (zombie spawn/zamanlama)
core_animation            # Animasyon motoru (keyframe tabanlı)
cvars_genel               # Genel konsol değişkenleri


# =============================================================================
# 2) EFFECTS (FX) — Görsel / İşitsel efektler
# =============================================================================
fx_sound                  # Ses motoru
fx_menu_background        # Menü arkaplan
fx_crosshair              # Nisangah (cvar ile ozellestirilebilir)
fx_skybox                 # Gökyüzü kutusu
fx_firstperson            # Birinci şahıs kamera + viewmodel overlay
fx_collision              # Çarpışma (zombi itme, mermi engel)
fx_damage_slow            # Hasar alınca yavaşlama efekti
fx_zombie_health          # Zombi can barı
fx_thumbnail              # Silah küçük resim (hotbar ikonları)
particle_fx               # Parçacık efektleri
#fx_aura_pulse            # (devre dışı) Aura dalga efekti
#fx_realistic_run         # (devre dışı) Gerçekçi koşma sallantısı


# =============================================================================
# 3) INPUT — Giriş yönetimi
# =============================================================================
input_manager             # Giriş yöneticisi (klavye/fare/dokunmatik)
input_joystick            # Mobil joystick desteği


# =============================================================================
# 5) MAPS — Haritalar (her satır bir harita, hepsi yüklenir)
# =============================================================================
map_arena                 # Arena haritası (detaylı, duvarlı)
map_polygon              # Poligon haritası (yalın, wave-based)
map_empty                 # Boş harita (test / özel mod)


# =============================================================================
# 6) MODELS — 3D modeller (loadScript ile yüklenen sub-plugin'lar)
# =============================================================================
model_boss                # Boss modeli


# =============================================================================
# 7) MENU & INTRO
# =============================================================================
menu_main                 # Ana menü sistemi
intro_sequence            # Harita giriş animasyonu


# =============================================================================
# 9) ENTITIES — Oyun varlıkları (player, zombie)
# =============================================================================
player_basic              # Oyuncu varlığı (can, hasar, skor)
player_movement           # Oyuncu hareket (yürüme, koşma, collider)
zombie_basic              # Zombi varlığı (yapay zeka, spawn, wave)


# =============================================================================
# 10) WEAPONS — Silahlar
# =============================================================================
weapon_pistol             # Tabanca (15 mermi, tek atış)
weapon_shotgun            # Pompalı tüfek (6 saçma, yavaş)
weapon_knife              # Bıçak (yakın dövüş, arc hit)


# =============================================================================
# 11) PICKUPS — Toplanabilir öğeler
# =============================================================================
pickup_health             # Can paketi
#pickup_xp                # (devre dışı) Deneyim puanı


# =============================================================================
# 12) MODIFIERS — Oynanış değiştiriciler
# =============================================================================
mod_combo_speed           # Combo sistemi (art arda öldürünce hızlanma)


# =============================================================================
# 13) UI — Kullanıcı arayüzü
# =============================================================================
ui_devconsole             # Geliştirici konsolu
ui_hud                    # Ana HUD (can, skor)
ui_hotbar                 # Silah çubuğu (5 slot)
ui_ammo                   # Mermi göstergesi
ui_blood_overlay          # Kan kaplama efekti
ui_pause                  # Duraklatma menüsü
ui_wave_announcer         # Dalga bildirimi
ui_model_test             # Model test odası (seçim)
ui_model_test_anim        # Model test odası (animasyon)
#ui_level                 # (devre dışı) Seviye sistemi


# =============================================================================
# 14) DEBUG / TEST
# =============================================================================
#test_hata debug           # (devre dışı) Hata test eklentisi
